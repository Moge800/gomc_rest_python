name: release

# Build one platform-specific wheel per target (each bundling only its matching
# gomc-rest binary) plus a binary-free sdist, and publish to PyPI on a version
# tag. All wheels cross-build on a single Linux runner (a wheel just zips the
# pre-built binary). The sdist is the client-only fallback: on platforms
# without a matching wheel (Windows arm64, glibc < 2.34, macOS < 12), pip
# builds it so connect() still works (launch() then raises a clear "binary not
# found/unsupported" error).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-wheels:
    name: wheel (${{ matrix.plat }})
    # A wheel just zips a pre-built binary and gets its platform tag forced by
    # `wheel tags`, so the build host's OS/arch is irrelevant — everything
    # cross-builds on one Linux runner (same idea as upstream gomc-rest, which
    # cross-compiles all platforms from ubuntu). This avoids depending on
    # scarce Windows/arm/macOS runners for releases.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: gomc-rest.exe
            plat: win_amd64
          # amd64 binary is dynamically linked and needs GLIBC_2.34, so it must
          # be tagged manylinux_2_34 (not 2014/glibc 2.17) or pip would install
          # it on older systems where it fails with "GLIBC_2.34 not found".
          - asset: gomc-rest-linux-amd64
            plat: manylinux_2_34_x86_64
          # arm64 binary is statically linked (no glibc dependency), so the
          # widest valid tag is fine.
          - asset: gomc-rest-linux-arm64
            plat: manylinux2014_aarch64
          # Both darwin binaries declare a minimum OS of macOS 12 (Monterey)
          # via LC_BUILD_VERSION, so the wheel must not claim an older floor.
          - asset: gomc-rest-darwin-amd64
            plat: macosx_12_0_x86_64
          - asset: gomc-rest-darwin-arm64
            plat: macosx_12_0_arm64
    steps:
      - uses: actions/checkout@v4
        with:
          # hatch-vcs derives the version from git tags
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade build wheel

      - name: Vendor the matching server binary
        run: python scripts/vendor_binaries.py --only ${{ matrix.asset }}

      - name: Build wheel
        run: python -m build --wheel

      - name: Re-tag wheel for this platform
        shell: bash
        run: python -m wheel tags --platform-tag ${{ matrix.plat }} --remove dist/*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.plat }}
          path: dist/*.whl

  build-sdist:
    name: sdist (client-only fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist (no binary bundled)
        run: |
          python -m pip install --upgrade build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: publish to PyPI
    needs: [build-wheels, build-sdist]
    # Only publish for real version tags; workflow_dispatch builds wheels for
    # verification but must never publish from an arbitrary branch.
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # trusted publishing (OIDC) — no API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Re-running a tag (e.g. after a workflow fix) must not fail on files
          # PyPI already has.
          skip-existing: true

  github-release:
    name: attach assets to GitHub Release
    # Gate on publish so a release is only created once PyPI actually has the
    # files; on a transient PyPI failure, re-running the tag is safe thanks to
    # skip-existing.
    needs: publish
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release and upload assets
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
